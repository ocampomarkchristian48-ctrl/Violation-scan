<!DOCTYPE html>
<html>
<head>
  <title>My Custom QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h2>My Custom QR Scanner</h2>
  <p>Scan QR code to process data.</p>
  <div id="qr-reader" style="width: 400px;"></div>
  <script>
    // Function to handle successful scan
    function onScanSuccess(decodedText, decodedResult) {
      alert("Scanned Data: " + decodedText);
      // Dito mo pwedeng i-send ang data sa server o i-process
      // Halimbawa:
      // fetch('YOUR_WEB_APP_URL', { method: 'POST', body: JSON.stringify({ qrData: decodedText }) });
    }

    // Initialize the scanner
    const html5QrCode = new Html5Qrcode("qr-reader");
    const qrCodeSuccessCallback = onScanSuccess;
    const config = { fps: 10, qrbox: 250 };

    // Start scanning gamit ang rear camera
    html5QrCode.start(
      { facingMode: "environment" },
      config,
      qrCodeSuccessCallback
    ).catch(err => {
      console.error("Hindi makapagsimula ang scanner.", err);
    });
  </script>
</body>
</html>
