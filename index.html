<!DOCTYPE html>
<html>
<head>
  <title>Own Camera QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h2>Own Camera QR Scanner</h2>
  <p>Gamitin ang camera para mag-scan ng iba't ibang QR codes.</p>
  <div id="qr-reader" style="width: 400px; height: 300px; border: 1px solid black;"></div>
  <button id="start-scan">Start Scanner</button>
  <button id="stop-scan">Stop Scanner</button>
  <script>
    let scanner;

    document.getElementById('start-scan').addEventListener('click', () => {
      if (scanner) {
        scanner.clear().then(() => {
          startScanner();
        }).catch(err => console.error(err));
      } else {
        startScanner();
      }
    });

    document.getElementById('stop-scan').addEventListener('click', () => {
      if (scanner) {
        scanner.clear();
      }
    });

    function startScanner() {
      scanner = new Html5Qrcode("qr-reader");
      scanner.start(
        { facingMode: "environment" }, // Rear camera
        { fps: 10, qrbox: 250 },
        decodedText => {
          alert("Scanned QR Code: " + decodedText);
          // Dito mo pwedeng i-process ang QR code data, tulad ng pag-send sa server
        }
      ).catch(err => {
        console.error("Error starting scanner:", err);
      });
    }
  </script>
</body>
</html>
