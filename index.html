<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner Log & List</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h2>Scan QR Code</h2>
  <p>Please scan the QR code to log attendance.</p>
  <div id="reader" style="width:300px;"></div>
  <script>
    function sendData(qrData) {
      fetch('https://https://script.google.com/macros/s/AKfycbzOOAKtn/exec', { // Palitan ito
        method: 'POST',
        body: JSON.stringify({ qrData: qrData }),
        headers: {
          'Content-Type': 'application/json'
        }
      })
      .then(res => res.text())
      .then(res => alert(res))
      .catch(err => console.error(err));
    }

    function onScanSuccess(decodedText) {
      console.log("Scanned: " + decodedText);
      sendData(decodedText); // I-log ang QR data
      html5QrcodeScanner.clear(); // Optional: itigil ang scanner
    }

    var html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 }
    );
    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
