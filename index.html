<!DOCTYPE html>
<html>

<head>
<title>Student QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Scan Student QR</h2>

<div id="reader" style="width:300px"></div>

<div id="studentInfo"></div>

<select id="violation">
<option value="Late">Late</option>
<option value="No ID">No ID</option>
<option value="Uniform">Uniform</option>
</select>

<button onclick="saveViolation()">Save</button>

<script>

var webApp="https://script.google.com/macros/s/AKfycbzZ4ycABVbGOOso37H7f4IflkuxQ1H7RFxg7TFzIO1wMqVg_b03QCAKy2RK5Tppeqb-/exec";

var currentID="";
var currentName="";

function onScanSuccess(decodedText){

currentID = decodedText;

fetch(webApp+"?action=getStudent&id="+decodedText)

.then(res=>res.text())

.then(data=>{

if(data=="NOT_FOUND"){
document.getElementById("studentInfo").innerHTML="Student not found";
}else{

var student = JSON.parse(data);

currentName = student.name;

document.getElementById("studentInfo").innerHTML=

"Name: "+student.name+"<br>"+
"ID: "+student.id+"<br>"+
"Section: "+student.section;

}

});

}

function saveViolation(){

var violation=document.getElementById("violation").value;

fetch(webApp+
"?action=saveViolation"+
"&id="+currentID+
"&name="+currentName+
"&violation="+violation)

.then(res=>res.text())
.then(data=>alert(data));

}

let scanner = new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250});

scanner.render(onScanSuccess);

</script>

</body>
</html>
