<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner to Google Sheets</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h2>Scan QR Code</h2>
  <div id="reader" style="width:300px;"></div>
  <script>
    // Function na magpapadala ng QR data sa backend
    function sendData(qrData) {
      fetch('https://script.google.com/macros/s/AKfycbwwhn0rXezP0CB7pPIROLkGpzS6lV7ut-0wczN2MKjBM1B5GgPZknA_JBslvQbcdZPO/exec', { // Palitan ito kung iba ang URL
        method: 'POST',
        body: JSON.stringify({ qrData: qrData }),
        headers: {
          'Content-Type': 'application/json'
        }
      })
      .then(response => response.text())
      .then(data => alert(data))
      .catch(error => console.error('Error:', error));
    }

    // Function kapag na-scan ang QR code
    function onScanSuccess(decodedText) {
      console.log(`Detected QR: ${decodedText}`);
      sendData(decodedText); // I-send sa backend
      // Optional: i-stop ang scanner pagkatapos magscan
      html5QrcodeScanner.clear();
    }

    // Initialize ang QR scanner
    var html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 }
    );
    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
