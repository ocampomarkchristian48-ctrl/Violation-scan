<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner Log & List</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h2>Scan QR Code</h2>
  <p>Please scan the QR code to log attendance.</p>
  <div id="reader" style="width:300px;"></div>
  <script>
    function sendData(qrData) {
      fetch('https://script.google.com/macros/s/AKfycbxpWGYl82Zi45aZj2JNfDp8Fs7zK-YWYWR6WsPZuYDYL5dzMAAeHz6cZ2Uz1oRY7TTn/exec', {
        method: 'POST',
        body: JSON.stringify({ qrData: qrData }),
        headers: {
          'Content-Type': 'application/json'
        }
      })
      .then(res => res.text())
      .then(res => alert(res))
      .catch(err => console.error(err));
    }

    function onScanSuccess(decodedText) {
      console.log("Scanned: " + decodedText);
      sendData(decodedText);
      // Optional: Restart scanner after delay to continue scanning
      setTimeout(() => {
        html5QrcodeScanner.render(onScanSuccess);
      }, 2000); // 2 seconds delay before next scan
    }

    var html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 }
    );
    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
